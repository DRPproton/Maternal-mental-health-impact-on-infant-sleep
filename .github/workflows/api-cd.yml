name: Deploy FastAPI Backend Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api/**' # Only run when changes occur in the API folder
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r api/requirements.txt
        
    # Example placeholder for unit tests (if applicable)
    # - name: Run tests
    #   run: |
    #     pip install pytest
    #     pytest api/tests/
  
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        cd api
        docker build -t maternal-mental-health-api:latest .
        
    # In a real production scenario, you would authenticate and push the image to a Container Registry:
    # - name: Push to Docker Hub / AWS ECR
    #   run: |
    #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    #     docker push yourusername/maternal-mental-health-api:latest
